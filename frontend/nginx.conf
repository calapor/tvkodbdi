server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://artworks.thetvdb.com https://image.tmdb.org data:; connect-src 'self'; frame-ancestors 'none';" always;

    error_page 502 503 504 /maintenance.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        resolver 10.43.0.10 valid=30s ipv6=off;
        set $upstream tvkodbdi-backend-service.default.svc.cluster.local;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout   180s;
        proxy_send_timeout      180s;
        proxy_read_timeout      180s;
        send_timeout            180s;
    }
}
